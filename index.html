<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>US</h3>
                <div id="home-number-box" class="number-box">
                    <span>0</span>
                </div>
                <div class="button-box">
                    <button id="home-add-1" onclick="addToHomeScore(1)"><span>+1</span></button>
                    <button id="home-add-2" onclick="addToHomeScore(2)"><span>+2</span></button>
                    <button id="home-add-3" onclick="addToHomeScore(3)"><span>+3</span></button>
                </div>
            </div>
            <div>
                <h3>THEM</h3>
                <div id="guest-number-box" class="number-box">
                    <span>0</span>
                </div>
                <div class="button-box">
                    <button id="guest-add-1" onclick="addToGuestScore(1)"><span>+1</span></button>
                    <button id="guest-add-2" onclick="addToGuestScore(2)"><span>+2</span></button>
                    <button id="guest-add-3" onclick="addToGuestScore(3)"><span>+3</span></button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
